name: Check for Pi Updates

on:
  schedule:
    - cron: '0 */18 * * *' # Checks every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check latest Pi release
        id: check
        run: |
          # pi releases endpoint
          LATEST_VERSION=$(curl -s https://api.github.com/repos/earendil-works/pi/releases/latest | jq -r .tag_name)
          CURRENT_VERSION=$(cat pi_version.txt)
          
          if [ "$LATEST_VERSION" != "null" ] && [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New version detected: $LATEST_VERSION"
            echo "$LATEST_VERSION" > pi_version.txt
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add pi_version.txt
            git commit -m "chore: bump pi version to $LATEST_VERSION"
            git push
          else
            echo "No new version detected. Current: $CURRENT_VERSION"
          fi
